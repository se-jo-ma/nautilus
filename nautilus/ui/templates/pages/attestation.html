{% extends "layouts/dashboard.html" %}

{% block title %}Attestation - Nautilus Admin{% endblock %}

{% block dashboard_content %}
<h1>Attestation Verify</h1>

{% if not signing_key_configured %}
<div class="empty-state">
    <p>Attestation not configured &mdash; no signing key available</p>
</div>
{% else %}
<div class="card">
    <form hx-post="/admin/attestation/verify"
          hx-target="#attestation-result"
          hx-swap="innerHTML">
        <div class="form-group">
            <label for="token-input">JWT Token</label>
            <textarea id="token-input"
                      name="token"
                      rows="6"
                      placeholder="Paste attestation token here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Verify</button>
    </form>
</div>

<div id="attestation-result"></div>
{% endif %}
{% endblock %}
