# DOC ONLY — see nautilus/rules/functions/nautilus_routing_rules.yaml for the
# actual compiled defrule body.
#
# fathom-rules 0.2.0 ``rules/*.yaml`` does not expose a syntax for emitting
# ``(test (not-in-list ?purpose ?allowed))`` LHS conditional elements, which
# the ``deny-purpose-mismatch`` rule requires. The rule is therefore shipped
# as a raw-CLIPS ``type: raw`` function entry; this file documents the
# design-intent YAML shape per design §5.3 and exists to satisfy the task
# file manifest. It is loaded by the compiler as an empty ruleset
# (``rules: []``) so it is safe against future ``from_rules`` autodiscovery.
#
# Design-intent shape (NOT a currently compilable rule):
# ----
# rules:
#   - name: deny-purpose-mismatch
#     salience: 200
#     when:
#       - template: agent
#         conditions:
#           - slot: purpose
#             bind: ?purpose
#       - template: source
#         conditions:
#           - slot: id
#             bind: ?sid
#           - slot: allowed_purposes
#             bind: ?allowed
#           - expression: "(neq ?allowed \"\")"             # <- not YAML-expressible today
#           - expression: "not-in-list(?purpose ?allowed)"  # <- not YAML-expressible today
#     then:
#       assert:
#         - template: denial_record
#           slots:
#             source_id: "?sid"
#             reason: "purpose not authorized"
#             rule_name: "deny-purpose-mismatch"
# ----
module: nautilus-routing
ruleset: nautilus-default-denial
version: "1.0"
rules: []
