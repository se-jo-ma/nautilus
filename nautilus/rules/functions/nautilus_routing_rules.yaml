# Nautilus built-in routing and denial rules, expressed as raw CLIPS
# defrule constructs wrapped in fathom-rules ``type: raw`` function entries.
#
# WHY RAW CLIPS AND NOT YAML ``rules/*.yaml``:
# fathom-rules 0.2.0 YAML ``expression:`` only parses a fixed operator set
# (equals/not_equals/in/not_in/contains/matches/below/etc.). There is no
# public YAML syntax for emitting a bare ``(test (<external> ?a ?b))``
# CE on the LHS. The rules below need exactly that shape
# (``(test (overlaps ?needed ?have))`` and ``(test (not-in-list ?purpose
# ?allowed))``). Expressing them as raw CLIPS via a ``type: raw`` function
# is the supported escape hatch; the YAML files under ``rules/`` serve as
# the design-facing documentation stubs (see their ``# DOC ONLY`` note).
#
# The ``overlaps`` and ``not-in-list`` externals must be registered via
# ``register_overlaps`` / ``register_not_in_list`` BEFORE ``load_functions``
# is called (otherwise CLIPS ``build`` fails with EXPRNPSR3).
#
functions:
  - name: nautilus_match_sources_by_data_type
    description: "Raw CLIPS defrule: match sources whose data_types overlap the intent."
    type: raw
    params: []
    body: |
      (defrule nautilus-routing::match-sources-by-data-type
         (declare (salience 100))
         (intent (data_types_needed ?needed))
         (source (id ?sid) (data_types ?have))
         (test (overlaps ?needed ?have))
         =>
         (assert (routing_decision
                    (source_id ?sid)
                    (reason "data_types overlap"))))

  - name: nautilus_deny_purpose_mismatch
    description: "Raw CLIPS defrule: deny sources whose allowed_purposes excludes the agent purpose."
    type: raw
    params: []
    body: |
      (defrule nautilus-routing::deny-purpose-mismatch
         (declare (salience 200))
         (agent (purpose ?purpose))
         (source (id ?sid) (allowed_purposes ?allowed))
         (test (neq ?allowed ""))
         (test (not-in-list ?purpose ?allowed))
         =>
         (assert (denial_record
                    (source_id ?sid)
                    (reason "purpose not authorized")
                    (rule_name "deny-purpose-mismatch"))))
