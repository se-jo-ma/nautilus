site_name: Nautilus Adapter SDK
site_description: Documentation for the Nautilus Adapter SDK — build third-party data adapters for the Nautilus routing platform.
site_url: https://se-jo-ma.github.io/nautilus/sdk/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Discovery: discovery.md
  - API Reference:
      - Protocol: reference/protocol.md
      - Types: reference/types.md
      - Testing: reference/testing.md
