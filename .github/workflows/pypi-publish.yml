name: pypi-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - run: uv sync
      - run: uv run python scripts/check_version_sync.py
      - run: uv run ruff check .
      - run: uv run pytest -m unit --tb=short -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"

      - name: Clean old artifacts
        run: rm -rf dist/

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
