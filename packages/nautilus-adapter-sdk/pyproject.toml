[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nautilus-adapter-sdk"
version = "0.1.0"
description = "SDK for building Nautilus data-source adapters"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[tool.setuptools.packages.find]
where = ["src"]
